# Alembic configuration file.
# The database URL is overridden by env.py using app.core.config.settings,
# so the value here is only a fallback for offline tooling.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Fallback URL — env.py overrides this at runtime with settings.database_url
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/service_request_chatbot

[post_write_hooks]
# Uncomment to auto-format generated migration files:
# hooks = ruff
# ruff.type = exec
# ruff.executable = %(here)s/.venv/bin/ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
